<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthNode - {% block title %}Doctor{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/base.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <h1 style="color: var(--admin-primary); font-weight: 700;">HealthNode</h1>
                </div>
                <p style="text-transform: uppercase;">DOCTOR DASHBOARD</p>
            </div>

            <div class="sidebar-menu">
                <a href="{{ url_for('doctor.home') }}" class="menu-item {% if request.endpoint == 'doctor.home' %}active{% endif %}">
                    <i class="fas fa-home" style="width: 20px; text-align: center;"></i> Home
                </a>
                
                <a href="{{ url_for('doctor.pacientes') }}" class="menu-item {% if request.endpoint == 'doctor.pacientes' %}active{% endif %}">
                    <i class="far fa-user" style="width: 20px; text-align: center;"></i> Pacientes
                </a>

                <a href="#" class="menu-item {% if request.endpoint == 'doctor.controles' %}active{% endif %}">
                    <i class="fas fa-clipboard-list" style="width: 20px; text-align: center;"></i> Controles Médicos
                </a>

                <a href="#" class="menu-item {% if request.endpoint == 'doctor.tratamientos' %}active{% endif %}">
                    <i class="fas fa-pills" style="width: 20px; text-align: center;"></i> Tratamientos
                </a>

                <a href="#" class="menu-item {% if request.endpoint == 'doctor.indicadores' %}active{% endif %}">
                    <i class="fas fa-chart-bar" style="width: 20px; text-align: center;"></i> Indicadores Clínicos
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="admin-profile" style="font-weight: 700; color: var(--admin-primary); font-size: 16px;">
                    Dr. {{ doctor.nombre }} {{ doctor.apellido }}
                </div>
                <a href="{{ url_for('auth.logout') }}" class="menu-item logout-link" style="padding-left: 0; margin-top: 8px;">
                    <i class="fas fa-sign-out-alt" style="width: 20px; text-align: center;"></i> Cerrar Sesión
                </a>
            </div>
        </nav>

        <main class="main-content">
            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
