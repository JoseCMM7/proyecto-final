<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthNode - {% block title %}Admin{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/base.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <i class="fas fa-shield-heart"></i>
                    <h1>HealthNode</h1>
                </div>
                <p>ADMIN PORTAL</p>
            </div>

                        <div class="sidebar-menu">
                <a href="{{ url_for('admin.home') }}" class="menu-item {% if request.endpoint == 'admin.home' %}active{% endif %}">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="{{ url_for('admin.pacientes') }}" class="menu-item {% if request.endpoint == 'admin.pacientes' %}active{% endif %}">
                    <i class="fas fa-user-injured"></i> Pacientes
                </a>
                
                <a href="{{ url_for('admin.doctores') }}" class="menu-item {% if request.endpoint == 'admin.doctores' %}active{% endif %}">
                    <i class="fas fa-user-md"></i> Doctores
                </a>

                <a href="{{ url_for('admin.recursos') }}" class="menu-item {% if request.endpoint == 'admin.recursos' %}active{% endif %}">
                    <i class="fas fa-box"></i> Gestion de recursos
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="admin-profile" style="font-weight: 700; color: var(--admin-primary); font-size: 16px;">
                    {{ admin_nombre }}
                </div>
                <a href="{{ url_for('auth.logout') }}" class="menu-item logout-link" style="padding-left: 0; margin-top: 8px;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesion
                </a>
            </div>
        </nav>

        <main class="main-content">
            <div class="content-wrapper">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
